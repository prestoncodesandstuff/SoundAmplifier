name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest
    
    - name: Build iOS App
      run: |
        xcodebuild -project SoundAmplifier.xcodeproj -scheme SoundAmplifier -sdk iphoneos -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      continue-on-error: false
    
    - name: Create IPA
      run: |
        mkdir -p Payload
        cp -r build/Release-iphoneos/SoundAmplifier.app Payload/SoundAmplifier.app
        zip -r SoundAmplifier.ipa Payload/
      continue-on-error: false
    
    - name: Upload IPA as artifact
      uses: actions/upload-artifact@v4
      with:
        name: SoundAmplifier-app
        path: SoundAmplifier.ipa
        retention-days: 30